<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RideConnect Admin</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="app">

  <!-- ============ AUTH VIEW ============ -->
  <section id="view-auth" class="view">
    <div class="card auth-card">
      <div class="brand-center">Ride<span>Connect</span> <small>Admin</small></div>
      <form id="loginForm">
        <label>Email <input type="email" id="loginEmail" required /></label>
        <label>Password <input type="password" id="loginPassword" required /></label>
        <button type="submit" class="btn-primary">Log In</button>
        <p class="form-msg" id="loginMsg"></p>
      </form>
    </div>
  </section>

  <!-- ============ DASHBOARD SHELL ============ -->
  <div id="view-dashboard" class="dashboard hidden">

    <aside class="sidebar">
      <div class="brand">Ride<span>Connect</span> <small>Admin</small></div>
      <nav>
        <button class="nav-btn active" data-tab="overview">📊 Overview</button>
        <button class="nav-btn" data-tab="drivers">🚗 Drivers</button>
        <button class="nav-btn" data-tab="customers">👤 Customers</button>
        <button class="nav-btn" data-tab="trips">🗺️ Live Trips</button>
        <button class="nav-btn" data-tab="pricing">💵 Pricing</button>
        <button class="nav-btn" data-tab="complaints">🚩 Complaints</button>
      </nav>
      <button id="logoutBtn" class="btn-link logout-btn">Log out</button>
    </aside>

    <main class="content">

      <!-- ---------- Overview ---------- -->
      <section id="tab-overview" class="tab-panel active">
        <h1>Overview</h1>
        <div class="stat-grid" id="statGrid"></div>
      </section>

      <!-- ---------- Drivers ---------- -->
      <section id="tab-drivers" class="tab-panel">
        <div class="tab-header">
          <h1>Drivers</h1>
          <select id="driverStatusFilter">
            <option value="">All statuses</option>
            <option value="pending">Pending</option>
            <option value="approved">Approved</option>
            <option value="rejected">Rejected</option>
          </select>
        </div>
        <div id="driversTableWrap" class="table-wrap"></div>
      </section>

      <!-- ---------- Customers ---------- -->
      <section id="tab-customers" class="tab-panel">
        <h1>Customers</h1>
        <div id="customersTableWrap" class="table-wrap"></div>
      </section>

      <!-- ---------- Live Trips ---------- -->
      <section id="tab-trips" class="tab-panel">
        <h1>Live Trips</h1>
        <div id="liveMap" class="map"></div>
        <div id="liveTripsTableWrap" class="table-wrap"></div>
      </section>

      <!-- ---------- Pricing ---------- -->
      <section id="tab-pricing" class="tab-panel">
        <h1>Pricing</h1>
        <form id="pricingForm" class="pricing-form card">
          <label>Base Fare (R) <input type="number" step="0.01" id="baseFare" required /></label>
          <label>Cost per KM (R) <input type="number" step="0.01" id="costPerKm" required /></label>
          <label>Cost per Minute (R) <input type="number" step="0.01" id="costPerMin" required /></label>
          <label>Minimum Fare (R) <input type="number" step="0.01" id="minimumFare" required /></label>
          <label>Cancellation Fee (R) <input type="number" step="0.01" id="cancellationFee" required /></label>
          <button type="submit" class="btn-primary">Save Pricing</button>
          <p class="form-msg" id="pricingMsg"></p>
        </form>
      </section>

      <!-- ---------- Complaints ---------- -->
      <section id="tab-complaints" class="tab-panel">
        <div class="tab-header">
          <h1>Complaints</h1>
          <select id="complaintStatusFilter">
            <option value="">All statuses</option>
            <option value="open">Open</option>
            <option value="investigating">Investigating</option>
            <option value="resolved">Resolved</option>
            <option value="dismissed">Dismissed</option>
          </select>
        </div>
        <div id="complaintsTableWrap" class="table-wrap"></div>
      </section>

    </main>
  </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/config.js"></script>
<script src="js/app.js"></script>
</body>
</html>
